<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Builder · Hololive OCG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3d;
    --accent: #c8a96e; --accent2: #7b68c8; --text: #e8e4f0; --muted: #7a7890;
    --white-color: #e8e0ff; --blue-color: #68b4e8; --green-color: #68c890;
    --red-color: #e87868; --colorless-color: #b0a8c8;
    --danger: #e87868; --success: #68c890;
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── Header ── */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; border-bottom: 1px solid var(--border); gap: 10px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .site-title { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent2) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
  .header-nav { display: flex; gap: 6px; }
  .nav-btn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 6px 12px; color: var(--muted); font-family: 'Lato', sans-serif; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(123,104,200,0.08); }
  .header-center { display: flex; align-items: center; gap: 8px; }
  .header-right { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }

  /* Deck name */
  #deckNameInput { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: 'Cinzel', serif; font-size: 0.92rem; font-weight: 600; padding: 3px 2px; width: 190px; outline: none; transition: border-color 0.15s; }
  #deckNameInput:focus { border-color: var(--accent); }
  #deckNameInput::placeholder { color: var(--muted); font-weight: 400; font-family: 'Lato', sans-serif; }

  /* Buttons */
  .btn { border-radius: 7px; padding: 7px 12px; font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border: 1px solid var(--accent); color: #111; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: none; border: 1px solid var(--border); color: var(--danger); }
  .btn-danger:hover { border-color: var(--danger); background: rgba(232,120,104,0.08); }
  .btn-mode { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 7px; padding: 7px 14px; font-family: 'Lato', sans-serif; font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-mode.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-mode:not(.active):hover { border-color: var(--accent2); color: var(--accent2); }
  .mode-switcher { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .mode-switcher .btn-mode { border: none; border-radius: 0; border-right: 1px solid var(--border); }
  .mode-switcher .btn-mode:last-child { border-right: none; }

  /* ── Pages ── */
  .page { display: none; flex: 1; min-height: 0; overflow: hidden; flex-direction: column; }
  .page.active { display: flex; }

  /* ── EDITOR layout ── */
  .editor-layout { display: grid; grid-template-columns: 1fr 340px; flex: 1; min-height: 0; overflow: hidden; }

  /* Browser */
  .browser { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .browser-toolbar { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px; color: var(--text); font-family: 'Lato', sans-serif; font-size: 0.83rem; outline: none; transition: border-color 0.15s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }
  .filter-row { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-right: 2px; flex-shrink: 0; }
  .filter-chip { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 9px; font-size: 0.7rem; color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 700; }
  .browser-grid { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 7px; align-content: start; }
  .browser-card { position: relative; cursor: pointer; border-radius: 7px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s, transform 0.12s; background: var(--surface); aspect-ratio: 0.72; }
  .browser-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .browser-card.in-deck { border-color: var(--accent2); }
  .browser-card.maxed { opacity: 0.4; cursor: not-allowed; }
  .browser-card.maxed:hover { transform: none; border-color: transparent; }
  .browser-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .browser-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.58rem; color: var(--muted); text-align: center; padding: 4px; }
  .in-deck-badge { position: absolute; top: 3px; right: 3px; background: var(--accent2); color: #fff; font-size: 0.62rem; font-weight: 700; width: 17px; height: 17px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .browser-card-name { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.88)); padding: 10px 3px 3px; font-size: 0.55rem; text-align: center; color: #fff; }
  .browser-count { padding: 5px 14px; font-size: 0.7rem; color: var(--muted); border-top: 1px solid var(--border); }

  /* Deck panel */
  .deck-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--surface); }
  .deck-stats { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 14px; flex-wrap: wrap; }
  .stat-item { display: flex; flex-direction: column; gap: 1px; }
  .stat-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .stat-value { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; }
  .stat-value.ok { color: var(--success); } .stat-value.warn { color: var(--accent); } .stat-value.err { color: var(--danger); }
  .deck-sections { flex: 1; overflow-y: auto; padding: 8px; }
  .deck-section { margin-bottom: 10px; }
  .deck-section-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 5px 5px 0 0; background: var(--surface2); border: 1px solid var(--border); border-bottom: none; }
  .deck-section-title { font-family: 'Cinzel', serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; }
  .deck-section-count { font-size: 0.65rem; color: var(--muted); }
  .deck-section-body { border: 1px solid var(--border); border-radius: 0 0 5px 5px; min-height: 28px; }
  .deck-entry { display: flex; align-items: center; gap: 7px; padding: 4px 8px; border-bottom: 1px solid rgba(42,42,61,0.5); transition: background 0.1s; }
  .deck-entry:last-child { border-bottom: none; }
  .deck-entry:hover { background: var(--surface2); }
  .deck-entry-thumb { width: 26px; height: 36px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
  .deck-entry-info { flex: 1; min-width: 0; }
  .deck-entry-name { font-size: 0.7rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deck-entry-sub { font-size: 0.6rem; color: var(--muted); }
  .deck-entry-controls { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
  .qty-btn { width: 19px; height: 19px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.78rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; line-height: 1; }
  .qty-btn:hover { border-color: var(--accent); color: var(--accent); }
  .qty-btn.minus:hover { border-color: var(--danger); color: var(--danger); }
  .qty-display { font-size: 0.75rem; font-weight: 700; min-width: 14px; text-align: center; color: var(--accent2); }
  .deck-empty-msg { padding: 10px; font-size: 0.7rem; color: var(--muted); text-align: center; font-style: italic; }
  .deck-validation { padding: 8px 12px; border-top: 1px solid var(--border); font-size: 0.7rem; display: flex; flex-direction: column; gap: 3px; }
  .validation-line { display: flex; align-items: center; gap: 5px; }
  .validation-line.ok { color: var(--success); } .validation-line.warn { color: var(--accent); } .validation-line.err { color: var(--danger); }

  /* Section color accents */
  .sec-oshi    .deck-section-title { color: #f0c060; }
  .sec-debut   .deck-section-title { color: var(--accent2); }
  .sec-first   .deck-section-title { color: var(--blue-color); }
  .sec-second  .deck-section-title { color: var(--green-color); }
  .sec-spot    .deck-section-title { color: var(--colorless-color); }
  .sec-support .deck-section-title { color: #c8a0b8; }
  .sec-cheer   .deck-section-title { color: var(--red-color); }

  /* ── VIEWER layout ── */
  .viewer-layout { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .viewer-empty {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; color: var(--muted); font-size: 0.88rem;
  }
  .viewer-empty-icon { font-size: 2.5rem; opacity: 0.3; }
  .viewer-empty-hint { font-size: 0.75rem; color: var(--muted); opacity: 0.7; }

  .viewer-header {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .viewer-deck-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
    flex: 1;
  }
  .viewer-stats { display: flex; gap: 14px; }
  .viewer-stat { font-size: 0.72rem; color: var(--muted); }
  .viewer-stat span { color: var(--text); font-weight: 700; }

  .viewer-body { flex: 1; overflow-y: auto; padding: 16px; }

  .viewer-section { margin-bottom: 24px; }
  .viewer-section-label {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .viewer-section-count { font-size: 0.68rem; color: var(--muted); font-family: 'Lato', sans-serif; font-weight: 400; letter-spacing: 0; }

  .viewer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
  }

  .viewer-card {
    position: relative;
    cursor: pointer;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform 0.12s, border-color 0.12s;
    background: var(--surface);
    aspect-ratio: 0.72;
  }
  .viewer-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .viewer-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .viewer-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); text-align: center; padding: 6px; }

  .viewer-qty-badge {
    position: absolute;
    bottom: 4px;
    right: 4px;
    background: rgba(0,0,0,0.75);
    color: var(--accent2);
    font-size: 0.68rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    border: 1px solid var(--accent2);
  }

  /* Section colors in viewer */
  .vsec-oshi   .viewer-section-label { color: #f0c060; }
  .vsec-debut  .viewer-section-label { color: var(--accent2); }
  .vsec-first  .viewer-section-label { color: var(--blue-color); }
  .vsec-second .viewer-section-label { color: var(--green-color); }
  .vsec-spot   .viewer-section-label { color: var(--colorless-color); }
  .vsec-support .viewer-section-label { color: #c8a0b8; }
  .vsec-cheer  .viewer-section-label { color: var(--red-color); }

  /* ── Modal (shared) ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: min(340px, 100%); overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
  .modal-img { width: 100%; aspect-ratio: 0.72; object-fit: cover; display: block; }
  .modal-body { padding: 14px; }
  .modal-setcode { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
  .modal-name { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
  .modal-name-jp { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
  .modal-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .modal-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.65rem; color: var(--muted); }
  .modal-text { font-size: 0.75rem; line-height: 1.6; color: var(--text); white-space: pre-line; margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .modal-actions { display: flex; gap: 7px; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 16px; font-size: 0.8rem; color: var(--text); z-index: 200; transition: transform 0.22s ease; white-space: nowrap; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 680px) {
    .editor-layout { grid-template-columns: 1fr; grid-template-rows: 1fr 42vh; }
    .deck-panel { border-top: 1px solid var(--border); }
    .browser { border-right: none; }
    .viewer-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
  }

  /* Save format modal */
  .save-modal { width: min(280px, 100%); }
  .save-modal-header { padding: 16px 16px 6px; font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; color: var(--accent); }
  .save-modal-hint { padding: 0 16px 12px; font-size: 0.7rem; color: var(--muted); line-height: 1.5; }
  .save-modal-actions { display: flex; flex-direction: column; gap: 7px; padding: 0 16px 16px; }
  .save-format-btn { width: 100%; justify-content: space-between; }
  .save-format-btn span { font-size: 0.65rem; font-weight: 400; color: var(--muted); }
  .save-format-btn.active span { color: inherit; opacity: 0.7; }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-left">
    <span class="site-title">Hololive OCG</span>
    <nav class="header-nav">
      <a href="index.html" class="nav-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Card Database
      </a>
      <a href="deckbuilder.html" class="nav-btn active">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Deck Builder
      </a>
    </nav>
  </div>

  <div class="header-center">
    <div class="mode-switcher">
      <button class="btn-mode active" id="modeEditBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit
      </button>
      <button class="btn-mode" id="modeViewBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        View
      </button>
    </div>
  </div>

  <div class="header-right">
    <input id="deckNameInput" type="text" placeholder="Untitled Deck" maxlength="48">
    <button class="btn btn-ghost" id="newDeckBtn">＋ New</button>
    <label class="btn btn-ghost" style="cursor:pointer">↑ Load<input type="file" id="loadFile" accept=".txt,.hocg" style="display:none"></label>
    <button class="btn btn-ghost" id="saveBtn">↓ Save</button>
    <button class="btn btn-danger" id="clearBtn">✕ Clear</button>
  </div>
</header>

<!-- ── EDITOR page ── -->
<div class="page active" id="pageEdit">
  <div class="editor-layout">
    <div class="browser">
      <div class="browser-toolbar">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="search" id="browserSearch" placeholder="Search cards…" autocomplete="off">
        </div>
        <div class="filter-row" id="typeFilters"><span class="filter-label">Type</span></div>
        <div class="filter-row" id="colorFilters"><span class="filter-label">Color</span></div>
      </div>
      <div class="browser-grid" id="browserGrid"></div>
      <div class="browser-count" id="browserCount"></div>
    </div>
    <div class="deck-panel">
      <div class="deck-stats" id="deckStats"></div>
      <div class="deck-sections" id="deckSections"></div>
      <div class="deck-validation" id="deckValidation"></div>
    </div>
  </div>
</div>

<!-- ── VIEWER page ── -->
<div class="page" id="pageView">
  <div class="viewer-layout">
    <div id="viewerEmpty" class="viewer-empty">
      <div class="viewer-empty-icon">🃏</div>
      <div>No deck loaded</div>
      <div class="viewer-empty-hint">Build a deck in Edit mode or load a .hocg file</div>
    </div>
    <div id="viewerContent" style="display:none;flex:1;flex-direction:column;overflow:hidden">
      <div class="viewer-header">
        <div class="viewer-deck-name" id="viewerDeckName"></div>
        <div class="viewer-stats" id="viewerStats"></div>
      </div>
      <div class="viewer-body" id="viewerBody"></div>
    </div>
  </div>
</div>

<!-- ── Modal (shared) ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <img class="modal-img" id="modalImg" src="" alt="">
    <div class="modal-body">
      <div class="modal-setcode" id="modalSetcode"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-name-jp" id="modalNameJp"></div>
      <div class="modal-meta" id="modalMeta"></div>
      <div class="modal-text" id="modalText"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" id="modalAdd" style="flex:1">Add to Deck</button>
        <button class="btn btn-ghost" id="modalClose">Close</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="saveOverlay">
  <div class="modal save-modal">
    <div class="save-modal-header">Save Deck As…</div>
    <div class="save-modal-hint">Choose a format. Both contain the same data.</div>
    <div class="save-modal-actions">
      <button class="btn btn-primary save-format-btn" id="saveHocgBtn">
        .hocg <span>Standard format · desktop</span>
      </button>
      <button class="btn btn-ghost save-format-btn" id="saveTxtBtn">
        .txt <span>Plain text · works on iPhone</span>
      </button>
      <button class="btn btn-ghost" id="saveCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let CARDS = [];
let deck  = { oshi:{}, main:{}, cheer:{} };
let previewCard = null;
let currentMode = 'edit'; // 'edit' | 'view'
let activeType  = null;
let activeColor = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
async function loadCards() {
  try {
    const res = await fetch('cards.json');
    CARDS = await res.json();
    buildFilters();
    renderBrowser();
    renderDeck();
  } catch(e) {
    document.getElementById('browserGrid').innerHTML =
      '<div style="grid-column:1/-1;color:var(--muted);font-size:0.8rem;padding:24px;text-align:center">Could not load cards.json</div>';
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseName(raw) {
  if (!raw) return { jp:'', en:'' };
  const parts = raw.split('\n');
  const jp = parts[0].trim();
  const en = (parts[1]||'').replace(/[()]/g,'').trim();
  return { jp, en: en||jp };
}

function getSection(card) {
  const t = (card.type||'').toLowerCase();
  if (t.includes('oshi'))   return 'oshi';
  if (t.includes('debut'))  return 'debut';
  if (t.includes('1st'))    return 'first';
  if (t.includes('2nd'))    return 'second';
  if (t.includes('spot'))   return 'spot';
  if (t.includes('cheer'))  return 'cheer';
  return 'support';
}

function isUnlimited(card) {
  return (card.text||'').toLowerCase().includes('you may include any number');
}

function maxCopies(card) {
  const s = getSection(card);
  if (s==='cheer') return Infinity;
  if (s==='debut' && isUnlimited(card)) return Infinity;
  if (s==='oshi')  return 1;
  return 4;
}

function countInDeck(card) {
  const s = getSection(card);
  if (s==='oshi')  return deck.oshi[card.setcode]  || 0;
  if (s==='cheer') return deck.cheer[card.setcode] || 0;
  return deck.main[card.setcode] || 0;
}

const mainTotal  = () => Object.values(deck.main).reduce((a,b)=>a+b,0);
const cheerTotal = () => Object.values(deck.cheer).reduce((a,b)=>a+b,0);
const hasOshi    = () => Object.keys(deck.oshi).length > 0;
const deckIsEmpty = () => !hasOshi() && mainTotal()===0 && cheerTotal()===0;

function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// ── Mode switching ────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('pageEdit').classList.toggle('active', mode==='edit');
  document.getElementById('pageView').classList.toggle('active', mode==='view');
  document.getElementById('modeEditBtn').classList.toggle('active', mode==='edit');
  document.getElementById('modeViewBtn').classList.toggle('active', mode==='view');
  if (mode==='view') renderViewer();
}

document.getElementById('modeEditBtn').addEventListener('click', ()=>setMode('edit'));
document.getElementById('modeViewBtn').addEventListener('click', ()=>setMode('view'));

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const types  = [...new Set(CARDS.map(c=>c.type).filter(Boolean))].sort();
  const colors = [...new Set(CARDS.map(c=>c.color).filter(Boolean).filter(c=>c!=='None'))].sort();
  const tEl = document.getElementById('typeFilters');
  const cEl = document.getElementById('colorFilters');
  tEl.innerHTML = '<span class="filter-label">Type</span>';
  cEl.innerHTML = '<span class="filter-label">Color</span>';
  types.forEach(t => {
    const c = document.createElement('button');
    c.className='filter-chip'; c.textContent=t; c.dataset.val=t;
    c.addEventListener('click',()=>{ activeType=activeType===t?null:t; tEl.querySelectorAll('.filter-chip').forEach(x=>x.classList.toggle('active',x.dataset.val===activeType)); renderBrowser(); });
    tEl.appendChild(c);
  });
  colors.forEach(cl => {
    const c = document.createElement('button');
    c.className='filter-chip'; c.textContent=cl; c.dataset.val=cl;
    c.addEventListener('click',()=>{ activeColor=activeColor===cl?null:cl; cEl.querySelectorAll('.filter-chip').forEach(x=>x.classList.toggle('active',x.dataset.val===activeColor)); renderBrowser(); });
    cEl.appendChild(c);
  });
}

// ── Browser ───────────────────────────────────────────────────────────────────
function renderBrowser() {
  const term = (document.getElementById('browserSearch').value||'').toLowerCase();
  const grid = document.getElementById('browserGrid');
  const countEl = document.getElementById('browserCount');
  const filtered = CARDS.filter(card => {
    if (activeType  && card.type  !== activeType)  return false;
    if (activeColor && card.color !== activeColor) return false;
    if (term) {
      const {jp,en}=parseName(card.name);
      return en.toLowerCase().includes(term)||jp.toLowerCase().includes(term)||
        card.setcode.toLowerCase().includes(term)||
        (card.tags||'').toLowerCase().includes(term)||(card.text||'').toLowerCase().includes(term);
    }
    return true;
  });
  grid.innerHTML='';
  filtered.forEach(card=>{
    const {en}=parseName(card.name);
    const qty=countInDeck(card), max=maxCopies(card), maxed=isFinite(max)&&qty>=max;
    const el=document.createElement('div');
    el.className=`browser-card${qty>0?' in-deck':''}${maxed?' maxed':''}`;
    el.title=`${en} (${card.setcode})`;
    el.innerHTML=card.image?`<img src="${card.image}" alt="${en}" loading="lazy">`:`<div class="browser-card-placeholder">${en}</div>`;
    if(qty>0) el.innerHTML+=`<div class="in-deck-badge">${qty}</div>`;
    el.innerHTML+=`<div class="browser-card-name">${en}</div>`;
    el.addEventListener('click',()=>{ if(maxed){toast(`Max ${max} copies`);return;} openPreview(card,'edit'); });
    grid.appendChild(el);
  });
  countEl.textContent=`${filtered.length} cards`;
}

// ── Preview modal ─────────────────────────────────────────────────────────────
function openPreview(card, context) {
  previewCard = card;
  const {en,jp} = parseName(card.name);
  const qty = countInDeck(card);
  const sec = getSection(card);

  document.getElementById('modalImg').src = card.image||'';
  document.getElementById('modalImg').style.display = card.image?'':'none';
  document.getElementById('modalSetcode').textContent = card.setcode;
  document.getElementById('modalName').textContent = en;
  document.getElementById('modalNameJp').textContent = (jp&&jp!==en) ? jp : '';
  document.getElementById('modalText').textContent = card.text||'';
  document.getElementById('modalText').style.display = card.text ? '' : 'none';

  // Meta tags
  const meta = document.getElementById('modalMeta');
  meta.innerHTML = [card.type, card.color, card.rarity, card.life_hp ? `${card.life_hp} HP` : null]
    .filter(Boolean).map(v=>`<span class="modal-tag">${v}</span>`).join('');

  const addBtn = document.getElementById('modalAdd');
  if (context === 'view') {
    // In viewer, no add button
    addBtn.style.display = 'none';
  } else {
    addBtn.style.display = '';
    const canAdd = sec==='oshi'?!hasOshi():sec==='cheer'?cheerTotal()<20:mainTotal()<50&&(!isFinite(maxCopies(card))||qty<maxCopies(card));
    addBtn.disabled = !canAdd;
    addBtn.textContent = canAdd ? `Add to Deck${qty>0?` (×${qty+1})`:''}`
      : qty>=maxCopies(card) ? 'Max copies reached' : 'Deck full';
  }

  document.getElementById('modalOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('modalOverlay').classList.remove('open');
  previewCard=null;
}

// ── Add / Remove ──────────────────────────────────────────────────────────────
function addCard(card) {
  const sec=getSection(card), max=maxCopies(card), qty=countInDeck(card);
  if(sec==='oshi'){if(hasOshi()){toast('Already have an Oshi');return false;}deck.oshi[card.setcode]=1;}
  else if(sec==='cheer'){if(cheerTotal()>=20){toast('Cheer deck full (20/20)');return false;}deck.cheer[card.setcode]=(deck.cheer[card.setcode]||0)+1;}
  else{if(mainTotal()>=50){toast('Main deck full (50/50)');return false;}if(isFinite(max)&&qty>=max){toast(`Max ${max} copies`);return false;}deck.main[card.setcode]=qty+1;}
  renderDeck(); renderBrowser(); return true;
}

function removeOne(setcode, sec) {
  if(sec==='oshi'){delete deck.oshi[setcode];}
  else if(sec==='cheer'){if((deck.cheer[setcode]||0)<=1)delete deck.cheer[setcode];else deck.cheer[setcode]--;}
  else{if((deck.main[setcode]||0)<=1)delete deck.main[setcode];else deck.main[setcode]--;}
  renderDeck(); renderBrowser();
}

// ── Render editor deck panel ──────────────────────────────────────────────────
const SECTIONS=[
  {key:'oshi',   label:'Oshi',   pool:'oshi', cls:'sec-oshi'},
  {key:'debut',  label:'Debut',  pool:'main', cls:'sec-debut'},
  {key:'first',  label:'1st',    pool:'main', cls:'sec-first'},
  {key:'second', label:'2nd',    pool:'main', cls:'sec-second'},
  {key:'spot',   label:'Spot',   pool:'main', cls:'sec-spot'},
  {key:'support',label:'Support',pool:'main', cls:'sec-support'},
  {key:'cheer',  label:'Cheer',  pool:'cheer',cls:'sec-cheer'},
];

function renderDeck() {
  const secEl=document.getElementById('deckSections');
  const statEl=document.getElementById('deckStats');
  const valEl=document.getElementById('deckValidation');
  secEl.innerHTML='';

  const groups=Object.fromEntries(SECTIONS.map(s=>[s.key,[]]));
  const all=[
    ...Object.entries(deck.oshi).map(([sc,q])=>({sc,q,pool:'oshi'})),
    ...Object.entries(deck.main).map(([sc,q])=>({sc,q,pool:'main'})),
    ...Object.entries(deck.cheer).map(([sc,q])=>({sc,q,pool:'cheer'})),
  ];
  all.forEach(({sc,q})=>{
    const card=CARDS.find(c=>c.setcode===sc);if(!card)return;
    const sec=getSection(card);if(groups[sec])groups[sec].push({card,qty:q});
  });

  SECTIONS.forEach(s=>{
    const entries=groups[s.key];
    const total=entries.reduce((a,e)=>a+e.qty,0);
    const wrap=document.createElement('div');
    wrap.className=`deck-section ${s.cls}`;
    wrap.innerHTML=`<div class="deck-section-header"><span class="deck-section-title">${s.label}</span><span class="deck-section-count">${total}</span></div><div class="deck-section-body"></div>`;
    const body=wrap.querySelector('.deck-section-body');
    if(!entries.length){body.innerHTML='<div class="deck-empty-msg">Empty</div>';}
    else{[...entries].sort((a,b)=>parseName(a.card.name).en.localeCompare(parseName(b.card.name).en)).forEach(({card,qty})=>{
      const {en}=parseName(card.name);
      const row=document.createElement('div');row.className='deck-entry';
      row.innerHTML=`${card.image?`<img class="deck-entry-thumb" src="${card.image}" alt="${en}">`:`<div class="deck-entry-thumb"></div>`}<div class="deck-entry-info"><div class="deck-entry-name">${en}</div><div class="deck-entry-sub">${card.setcode}${isUnlimited(card)?' · ∞':''}</div></div><div class="deck-entry-controls"><button class="qty-btn minus">−</button><span class="qty-display">${qty}</span><button class="qty-btn plus">＋</button></div>`;
      row.querySelector('.minus').addEventListener('click',()=>removeOne(card.setcode,s.key));
      row.querySelector('.plus').addEventListener('click',()=>addCard(card));
      body.appendChild(row);
    });}
    secEl.appendChild(wrap);
  });

  const main=mainTotal(),cheer=cheerTotal(),oshi=hasOshi()?1:0;
  statEl.innerHTML=`
    <div class="stat-item"><div class="stat-label">Oshi</div><div class="stat-value ${oshi===1?'ok':'warn'}">${oshi}/1</div></div>
    <div class="stat-item"><div class="stat-label">Main Deck</div><div class="stat-value ${main===50?'ok':main>50?'err':'warn'}">${main}/50</div></div>
    <div class="stat-item"><div class="stat-label">Cheer Deck</div><div class="stat-value ${cheer===20?'ok':cheer>20?'err':'warn'}">${cheer}/20</div></div>
    <div class="stat-item"><div class="stat-label">Total</div><div class="stat-value">${oshi+main+cheer}</div></div>`;

  const issues=[];
  if(oshi!==1)  issues.push({cls:'err', msg:'Needs exactly 1 Oshi card'});
  if(main<50)   issues.push({cls:'warn',msg:`Main deck: ${50-main} more card${50-main===1?'':'s'} needed`});
  if(main>50)   issues.push({cls:'err', msg:`Main deck: ${main-50} card${main-50===1?'':'s'} over limit`});
  if(cheer<20)  issues.push({cls:'warn',msg:`Cheer deck: ${20-cheer} more card${20-cheer===1?'':'s'} needed`});
  if(cheer>20)  issues.push({cls:'err', msg:`Cheer deck: ${cheer-20} card${cheer-20===1?'':'s'} over limit`});
  if(!issues.length) issues.push({cls:'ok',msg:'✓ Deck is tournament legal'});
  valEl.innerHTML=issues.map(i=>`<div class="validation-line ${i.cls}">${i.msg}</div>`).join('');
}

// ── Render viewer ─────────────────────────────────────────────────────────────
const VSECTIONS=[
  {key:'oshi',   label:'Oshi',   vcls:'vsec-oshi'},
  {key:'debut',  label:'Debut',  vcls:'vsec-debut'},
  {key:'first',  label:'1st Holomem', vcls:'vsec-first'},
  {key:'second', label:'2nd Holomem', vcls:'vsec-second'},
  {key:'spot',   label:'Spot Holomem',vcls:'vsec-spot'},
  {key:'support',label:'Support',vcls:'vsec-support'},
  {key:'cheer',  label:'Cheer Deck',  vcls:'vsec-cheer'},
];

function renderViewer() {
  const emptyEl   = document.getElementById('viewerEmpty');
  const contentEl = document.getElementById('viewerContent');
  const bodyEl    = document.getElementById('viewerBody');
  const nameEl    = document.getElementById('viewerDeckName');
  const statsEl   = document.getElementById('viewerStats');

  if (deckIsEmpty()) {
    emptyEl.style.display='flex'; contentEl.style.display='none'; return;
  }
  emptyEl.style.display='none'; contentEl.style.display='flex';

  const deckName = document.getElementById('deckNameInput').value || 'Untitled Deck';
  nameEl.textContent = deckName;

  const main=mainTotal(), cheer=cheerTotal(), oshi=hasOshi()?1:0;
  statsEl.innerHTML=`
    <div class="viewer-stat">Oshi <span>${oshi}/1</span></div>
    <div class="viewer-stat">Main <span>${main}/50</span></div>
    <div class="viewer-stat">Cheer <span>${cheer}/20</span></div>`;

  // Group
  const groups=Object.fromEntries(VSECTIONS.map(s=>[s.key,[]]));
  const all=[
    ...Object.entries(deck.oshi).map(([sc,q])=>({sc,q})),
    ...Object.entries(deck.main).map(([sc,q])=>({sc,q})),
    ...Object.entries(deck.cheer).map(([sc,q])=>({sc,q})),
  ];
  all.forEach(({sc,q})=>{
    const card=CARDS.find(c=>c.setcode===sc);if(!card)return;
    const sec=getSection(card);if(groups[sec])groups[sec].push({card,qty:q});
  });

  bodyEl.innerHTML='';
  VSECTIONS.forEach(s=>{
    const entries=groups[s.key];
    if(!entries.length) return;
    const total=entries.reduce((a,e)=>a+e.qty,0);

    // Expand entries: repeat card for each copy (up to 4), so qty is visible as image count
    // But for unlimited/large quantities just show the image once with a ×N badge
    const wrap=document.createElement('div');
    wrap.className=`viewer-section ${s.vcls}`;
    wrap.innerHTML=`<div class="viewer-section-label">${s.label}<span class="viewer-section-count">${total} cards</span></div><div class="viewer-grid"></div>`;
    const grid=wrap.querySelector('.viewer-grid');

    [...entries].sort((a,b)=>parseName(a.card.name).en.localeCompare(parseName(b.card.name).en))
      .forEach(({card,qty})=>{
        const {en}=parseName(card.name);
        // Show one tile per copy (up to 4), or one tile with badge if >4
        const tiles = qty <= 4 ? qty : 1;
        const showBadge = qty > 4;
        for(let i=0;i<tiles;i++){
          const el=document.createElement('div');
          el.className='viewer-card';
          el.title=`${en} — ${card.setcode}`;
          el.innerHTML=card.image?`<img src="${card.image}" alt="${en}" loading="lazy">`:`<div class="viewer-card-placeholder">${en}</div>`;
          if(showBadge||qty>1) el.innerHTML+=`<div class="viewer-qty-badge">×${qty}</div>`;
          el.addEventListener('click',()=>openPreview(card,'view'));
          grid.appendChild(el);
        }
      });

    bodyEl.appendChild(wrap);
  });
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function saveDeck(ext='hocg') {
  const name=document.getElementById('deckNameInput').value||'Untitled Deck';
  const lines=[`#name:${name}`,'#format:hOCG-1.0','#'];
  [...Object.entries(deck.oshi),...Object.entries(deck.main),...Object.entries(deck.cheer)]
    .forEach(([sc,q])=>lines.push(`${sc}:${q}`));
  const blob=new Blob([lines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${name.replace(/[^\w\- ]/g,'_')}.${ext}`;
  a.click();URL.revokeObjectURL(a.href);
  toast(`Deck saved as .${ext} ✓`);
}

function loadDeckText(text) {
  const nd={oshi:{},main:{},cheer:{}};
  let name='Untitled Deck';
  text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    if(line.startsWith('#name:')){name=line.slice(6);return;}
    if(line.startsWith('#'))return;
    const m=line.match(/^([A-Za-z0-9\-]+):(\d+)$/);if(!m)return;
    const card=CARDS.find(c=>c.setcode===m[1]);if(!card){console.warn('Unknown setcode:',m[1]);return;}
    const qty=parseInt(m[2],10),sec=getSection(card);
    if(sec==='oshi')nd.oshi[m[1]]=qty;else if(sec==='cheer')nd.cheer[m[1]]=qty;else nd.main[m[1]]=qty;
  });
  deck=nd;
  document.getElementById('deckNameInput').value=name;
  renderDeck();renderBrowser();
  if(currentMode==='view')renderViewer();
  toast(`Loaded: ${name}`);
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('browserSearch').addEventListener('input',renderBrowser);
document.getElementById('deckNameInput').addEventListener('input',e=>{ deck.name=e.target.value; if(currentMode==='view') document.getElementById('viewerDeckName').textContent=e.target.value; });
document.getElementById('saveBtn').addEventListener('click',()=>{
  document.getElementById('saveOverlay').classList.add('open');
});
document.getElementById('saveHocgBtn').addEventListener('click',()=>{
  document.getElementById('saveOverlay').classList.remove('open');
  saveDeck('hocg');
});
document.getElementById('saveTxtBtn').addEventListener('click',()=>{
  document.getElementById('saveOverlay').classList.remove('open');
  saveDeck('txt');
});
document.getElementById('saveCancelBtn').addEventListener('click',()=>{
  document.getElementById('saveOverlay').classList.remove('open');
});
document.getElementById('saveOverlay').addEventListener('click',e=>{
  if(e.target===e.currentTarget) document.getElementById('saveOverlay').classList.remove('open');
});
document.getElementById('clearBtn').addEventListener('click',()=>{
  if(!confirm('Clear current deck?'))return;
  deck={oshi:{},main:{},cheer:{}};renderDeck();renderBrowser();if(currentMode==='view')renderViewer();
});
document.getElementById('newDeckBtn').addEventListener('click',()=>{
  if(!confirm('Start a new deck? Unsaved changes will be lost.'))return;
  deck={oshi:{},main:{},cheer:{}};document.getElementById('deckNameInput').value='';
  renderDeck();renderBrowser();if(currentMode==='view')renderViewer();
});
document.getElementById('loadFile').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>loadDeckText(ev.target.result);r.readAsText(f);
  e.target.value='';
});
document.getElementById('modalAdd').addEventListener('click',()=>{
  if(!previewCard)return;
  if(addCard(previewCard))openPreview(previewCard,'edit');
});
document.getElementById('modalClose').addEventListener('click',closePreview);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closePreview();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePreview();});

loadCards();
</script>
</body>
</html>
