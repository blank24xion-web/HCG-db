<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Builder · Hololive OCG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
/* ── Reset & tokens ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c28; --border: #2a2a3d;
  --accent: #c8a96e; --accent2: #7b68c8; --text: #e8e4f0; --muted: #7a7890;
  --white-color: #e8e0ff; --blue-color: #68b4e8; --green-color: #68c890;
  --red-color: #e87868; --colorless-color: #b0a8c8;
  --danger: #e87868; --success: #68c890;
  --header-h: 52px;
  --panel-w: 320px;
}

html { height: 100%; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Lato', sans-serif;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── Header ─────────────────────────────────────────────────────────────────── */
.header {
  flex-shrink: 0;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  gap: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}
.header-left   { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.header-center { display: flex; align-items: center; }
.header-right  { display: flex; align-items: center; gap: 6px; }

.site-title {
  font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; white-space: nowrap;
  background: linear-gradient(135deg, var(--accent) 0%, #fff 50%, var(--accent2) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.nav-btn {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  padding: 5px 11px; color: var(--muted); font-family: 'Lato', sans-serif; font-size: 0.75rem;
  cursor: pointer; transition: all 0.15s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
}
.nav-btn:hover  { border-color: var(--accent); color: var(--accent); }
.nav-btn.active { border-color: var(--accent2); color: var(--accent2); background: rgba(123,104,200,0.08); }

.mode-switcher { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.btn-mode {
  background: none; border: none; border-right: 1px solid var(--border);
  color: var(--muted); font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
  padding: 6px 14px; cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.btn-mode:last-child { border-right: none; }
.btn-mode.active { background: var(--accent2); color: #fff; }
.btn-mode:not(.active):hover { color: var(--accent2); background: rgba(123,104,200,0.08); }

#deckNameInput {
  background: transparent; border: none; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'Cinzel', serif; font-size: 0.88rem; font-weight: 600;
  padding: 2px; width: 180px; outline: none; transition: border-color 0.15s;
}
#deckNameInput:focus { border-color: var(--accent); }
#deckNameInput::placeholder { color: var(--muted); font-weight: 400; font-family: 'Lato', sans-serif; }

.btn {
  border-radius: 7px; padding: 6px 11px; font-family: 'Lato', sans-serif;
  font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; border: 1px solid transparent;
}
.btn-ghost   { background: none; border-color: var(--border); color: var(--muted); }
.btn-ghost:hover  { border-color: var(--accent); color: var(--accent); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #111; }
.btn-primary:hover { opacity: 0.85; }
.btn-danger  { background: none; border-color: var(--border); color: var(--danger); }
.btn-danger:hover  { border-color: var(--danger); background: rgba(232,120,104,0.08); }

/* ── Pages wrapper ───────────────────────────────────────────────────────────── */
/* Takes all remaining height after the fixed header */
.pages {
  position: relative;
  flex: 1;
  min-height: 0;
}

.page {
  display: none;
  position: absolute;
  inset: 0;
}
.page.active { display: flex; }

/* ── EDITOR: two absolute columns ────────────────────────────────────────────── */
#pageEdit .browser {
  position: absolute;
  inset: 0;
  right: var(--panel-w);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--bg);
}

#pageEdit .deck-panel {
  position: absolute;
  inset: 0;
  left: auto;
  width: var(--panel-w);
  display: flex;
  flex-direction: column;
  background: var(--surface);
}

/* ── Browser internals ──────────────────────────────────────────────────────── */
.browser-toolbar {
  flex-shrink: 0;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 7px;
}
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 12px 7px 32px; color: var(--text); font-family: 'Lato', sans-serif;
  font-size: 0.82rem; outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--muted); }

.filter-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.filter-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); margin-right: 2px; flex-shrink: 0; }
.filter-chip {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
  padding: 2px 8px; font-size: 0.68rem; color: var(--muted); cursor: pointer; transition: all 0.12s;
}
.filter-chip:hover  { border-color: var(--accent); color: var(--accent); }
.filter-chip.active { background: var(--accent); border-color: var(--accent); color: #111; font-weight: 700; }

/* Scroll container + grid — the grid is just a normal block that grows downward */
.browser-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.browser-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 10px;
  padding: 12px;
}

.browser-count {
  flex-shrink: 0;
  padding: 5px 12px;
  font-size: 0.68rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
}

/* ── Browser card ────────────────────────────────────────────────────────────── */
.browser-card {
  position: relative;
  cursor: pointer;
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid transparent;
  background: var(--surface);
  transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
}
.browser-card:hover        { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(200,169,110,0.15); }
.browser-card.in-deck      { border-color: var(--accent2); }
.browser-card.maxed        { opacity: 0.4; cursor: not-allowed; }
.browser-card.maxed:hover  { transform: none; border-color: transparent; box-shadow: none; }

.bc-img-wrap { width: 100%; aspect-ratio: 2/3; background: var(--surface2); overflow: hidden; }
.bc-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.bc-placeholder { width: 100%; aspect-ratio: 2/3; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); text-align: center; padding: 6px; background: var(--surface2); }
.bc-color-bar { height: 3px; width: 100%; }
.bc-info { padding: 5px 7px 7px; }
.bc-name { font-size: 0.67rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.bc-sub  { font-size: 0.58rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.in-deck-badge {
  position: absolute; top: 5px; right: 5px;
  background: var(--accent2); color: #fff; font-size: 0.62rem; font-weight: 700;
  min-width: 20px; height: 20px; border-radius: 10px; padding: 0 5px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Quick-add / quick-remove buttons ──────────────────────────────────────── */
.bc-quick {
  position: absolute;
  bottom: 6px;
  right: 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  z-index: 2;
}
.bc-qbtn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: none;
  font-size: 1rem;
  font-weight: 900;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.12s, opacity 0.12s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.55);
}
.bc-qbtn:active { transform: scale(0.88); }
.bc-qbtn-add  { background: #3db86a; color: #fff; }
.bc-qbtn-rem  { background: #e05252; color: #fff; }
.bc-qbtn-add:disabled { opacity: 0; pointer-events: none; }

/* ── Quick-add / quick-remove buttons ──────────────────────────────────────── */
.bc-quick {
  position: absolute;
  bottom: 6px; right: 6px;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.bc-quick-btn {
  width: 26px; height: 26px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; line-height: 1; font-weight: 700;
  cursor: pointer; transition: transform 0.12s, opacity 0.12s;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
  /* stop tap from bubbling up to the card (which opens modal) */
  pointer-events: auto;
}
.bc-quick-btn:active { transform: scale(0.88); }
.bc-quick-minus {
  background: var(--danger); color: #fff;
}
.bc-quick-plus  {
  background: var(--success); color: #111;
}
.bc-quick-btn.hidden { display: none; }

/* Color bars */
.color-White    { background: var(--white-color); }
.color-Blue     { background: var(--blue-color); }
.color-Green    { background: var(--green-color); }
.color-Red      { background: var(--red-color); }
.color-Purple   { background: var(--accent2); }
.color-Yellow   { background: #d4b84a; }
.color-RedBlue  { background: linear-gradient(90deg, var(--red-color) 50%, var(--blue-color) 50%); }
.color-WhiteGreen { background: linear-gradient(90deg, var(--white-color) 50%, var(--green-color) 50%); }
.color-None, .color-Colorless { background: var(--colorless-color); }

/* ── Deck panel ──────────────────────────────────────────────────────────────── */
.deck-stats {
  flex-shrink: 0;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; gap: 12px; flex-wrap: wrap;
}
.stat-item { display: flex; flex-direction: column; gap: 1px; }
.stat-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
.stat-value { font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600; }
.stat-value.ok   { color: var(--success); }
.stat-value.warn { color: var(--accent); }
.stat-value.err  { color: var(--danger); }

.deck-sections { flex: 1; overflow-y: auto; padding: 8px; }

.deck-section { margin-bottom: 8px; }
.deck-section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 4px 8px; background: var(--surface2);
  border: 1px solid var(--border); border-bottom: none;
  border-radius: 5px 5px 0 0;
}
.deck-section-title { font-family: 'Cinzel', serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.06em; }
.deck-section-count { font-size: 0.63rem; color: var(--muted); }
.deck-section-body  { border: 1px solid var(--border); border-radius: 0 0 5px 5px; min-height: 24px; }

.deck-entry {
  display: flex; align-items: center; gap: 7px;
  padding: 4px 8px; border-bottom: 1px solid rgba(42,42,61,0.5); transition: background 0.1s;
}
.deck-entry:last-child { border-bottom: none; }
.deck-entry:hover { background: var(--surface2); }
.deck-entry-thumb { width: 24px; height: 33px; border-radius: 3px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.deck-entry-info  { flex: 1; min-width: 0; }
.deck-entry-name  { font-size: 0.68rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.deck-entry-sub   { font-size: 0.58rem; color: var(--muted); }
.deck-entry-controls { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.qty-btn {
  width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text); font-size: 0.75rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.1s; line-height: 1;
}
.qty-btn:hover       { border-color: var(--accent); color: var(--accent); }
.qty-btn.minus:hover { border-color: var(--danger); color: var(--danger); }
.qty-display { font-size: 0.73rem; font-weight: 700; min-width: 14px; text-align: center; color: var(--accent2); }
.deck-empty-msg { padding: 8px; font-size: 0.68rem; color: var(--muted); text-align: center; font-style: italic; }

.deck-validation {
  flex-shrink: 0; padding: 7px 10px; border-top: 1px solid var(--border);
  font-size: 0.68rem; display: flex; flex-direction: column; gap: 3px;
}
.validation-line { display: flex; align-items: center; gap: 5px; }
.validation-line.ok   { color: var(--success); }
.validation-line.warn { color: var(--accent); }
.validation-line.err  { color: var(--danger); }

/* Section title colors */
.sec-oshi    .deck-section-title { color: #f0c060; }
.sec-debut   .deck-section-title { color: var(--accent2); }
.sec-first   .deck-section-title { color: var(--blue-color); }
.sec-second  .deck-section-title { color: var(--green-color); }
.sec-spot    .deck-section-title { color: var(--colorless-color); }
.sec-support .deck-section-title { color: #c8a0b8; }
.sec-cheer   .deck-section-title { color: var(--red-color); }

/* ── VIEWER ──────────────────────────────────────────────────────────────────── */
#pageView { flex-direction: column; }

.viewer-empty {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: var(--muted); font-size: 0.88rem;
}
.viewer-empty-icon { font-size: 2.5rem; opacity: 0.3; }
.viewer-empty-hint { font-size: 0.75rem; opacity: 0.7; }

#viewerContent { display: none; flex-direction: column; flex: 1; min-height: 0; }

.viewer-header {
  flex-shrink: 0; padding: 10px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.viewer-deck-name { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; color: var(--accent); flex: 1; }
.viewer-stats { display: flex; gap: 14px; }
.viewer-stat  { font-size: 0.72rem; color: var(--muted); }
.viewer-stat span { color: var(--text); font-weight: 700; }

.viewer-body { flex: 1; overflow-y: auto; padding: 16px; }

.viewer-section { margin-bottom: 24px; }
.viewer-section-label {
  font-family: 'Cinzel', serif; font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.viewer-section-count { font-size: 0.68rem; color: var(--muted); font-family: 'Lato', sans-serif; font-weight: 400; letter-spacing: 0; }
.viewer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
.viewer-card {
  position: relative; cursor: pointer; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); background: var(--surface); aspect-ratio: 0.72;
  transition: transform 0.12s, border-color 0.12s;
}
.viewer-card:hover { transform: translateY(-3px); border-color: var(--accent); }
.viewer-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.viewer-card-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: var(--muted); text-align: center; padding: 6px; }
.viewer-qty-badge {
  position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.75); color: var(--accent2);
  font-size: 0.68rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; border: 1px solid var(--accent2);
}

.vsec-oshi    .viewer-section-label { color: #f0c060; }
.vsec-debut   .viewer-section-label { color: var(--accent2); }
.vsec-first   .viewer-section-label { color: var(--blue-color); }
.vsec-second  .viewer-section-label { color: var(--green-color); }
.vsec-spot    .viewer-section-label { color: var(--colorless-color); }
.vsec-support .viewer-section-label { color: #c8a0b8; }
.vsec-cheer   .viewer-section-label { color: var(--red-color); }

/* ── Modals ──────────────────────────────────────────────────────────────────── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: min(340px,100%); box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-height: 90vh; overflow-y: auto; }
.modal-img     { width: 100%; aspect-ratio: 0.72; object-fit: cover; display: block; }
.modal-body    { padding: 14px; }
.modal-setcode { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
.modal-name    { font-family: 'Cinzel', serif; font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
.modal-name-jp { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; }
.modal-meta    { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.modal-tag     { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.65rem; color: var(--muted); }
.modal-text    { font-size: 0.75rem; line-height: 1.6; color: var(--text); white-space: pre-line; margin-bottom: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
.modal-actions { display: flex; gap: 7px; }

.dialogue-modal   { width: min(300px,100%); }
.dialogue-header  { padding: 16px 16px 6px; font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600; color: var(--accent); }
.dialogue-hint    { padding: 0 16px 12px; font-size: 0.7rem; color: var(--muted); line-height: 1.5; }
.dialogue-actions { display: flex; flex-direction: column; gap: 7px; padding: 0 16px 16px; }
.dialogue-btn     { width: 100%; justify-content: space-between; }
.dialogue-btn span { font-size: 0.65rem; font-weight: 400; opacity: 0.7; }
.dialogue-divider { text-align: center; font-size: 0.65rem; color: var(--muted); padding: 2px 0; }
.paste-area-wrap  { padding: 0 16px 12px; }
#pasteTextarea {
  width: 100%; height: 160px; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 10px; color: var(--text); font-family: monospace;
  font-size: 0.73rem; outline: none; resize: vertical; transition: border-color 0.15s;
}
#pasteTextarea:focus { border-color: var(--accent); }
#pasteTextarea::placeholder { color: var(--muted); }
.paste-confirm-row { display: flex; gap: 7px; padding: 0 16px 16px; }

/* ── Recent Decks ─────────────────────────────────────────────────────────── */
.recent-section { padding: 0 16px 4px; }
.recent-label   { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.recent-slot    { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; margin-bottom: 5px; cursor: pointer; transition: border-color 0.15s; }
.recent-slot:hover { border-color: var(--accent); }
.recent-slot-name { flex: 1; font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.recent-slot-date { font-size: 0.62rem; color: var(--muted); white-space: nowrap; }
.recent-slot-del  { font-size: 0.75rem; color: var(--muted); padding: 2px 4px; border-radius: 4px; line-height: 1; }
.recent-slot-del:hover { color: var(--text); background: var(--border); }

/* ── Toast ───────────────────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px);
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 16px; font-size: 0.8rem; color: var(--text);
  z-index: 200; transition: transform 0.22s ease; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Mobile FAB + drawer ─────────────────────────────────────────────────────── */
.deck-fab {
  display: none; position: fixed; bottom: 20px; right: 18px; z-index: 60;
  background: var(--accent2); color: #fff; border: none; border-radius: 28px;
  padding: 11px 18px; gap: 7px; font-family: 'Lato', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 18px rgba(0,0,0,0.45); transition: transform 0.15s; align-items: center;
}
.deck-fab:active { transform: scale(0.95); }
.deck-fab-badge { background: var(--accent); color: #111; font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center; }

.deck-drawer-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 70; }
.deck-drawer-backdrop.open { display: block; }
.deck-drawer {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  background: var(--surface); border-radius: 16px 16px 0 0; border-top: 1px solid var(--border);
  display: flex; flex-direction: column; max-height: 82vh;
  transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.32,0.72,0,1);
}
.deck-drawer.open { transform: translateY(0); }
.deck-drawer-handle { flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 10px 0 4px; cursor: pointer; }
.deck-drawer-handle::after { content: ''; display: block; width: 38px; height: 4px; background: var(--border); border-radius: 2px; }
.deck-drawer-header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 4px 14px 8px; border-bottom: 1px solid var(--border); }
.deck-drawer-title  { font-family: 'Cinzel', serif; font-size: 0.82rem; font-weight: 600; color: var(--accent); }
.deck-drawer-close  { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 2px 6px; }
.deck-drawer .deck-stats    { padding: 8px 14px; }
.deck-drawer .deck-sections { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
.deck-drawer .deck-validation { padding: 8px 12px; }

/* Desktop: single row header */
.header-row1 { display: flex; align-items: center; justify-content: space-between; width: 100%; padding: 0 16px; height: var(--header-h); gap: 10px; }
.header-row2 { display: none; }
.header-row3 { display: none; }

/* ── Responsive ──────────────────────────────────────────────────────────────── */
@media (max-width: 680px) {
  :root { --panel-w: 0px; }

  /* Header expands into 3 rows */
  .header {
    flex-direction: column;
    align-items: stretch;
    height: auto;
    padding: 0;
    gap: 0;
  }

  /* Row 1: logo + nav links */
  .header-row1 {
    height: auto;
    padding: 10px 14px;
    justify-content: flex-start;
    gap: 10px;
    border-bottom: none;
  }
  /* Hide desktop deck name + action buttons */
  .header-row1 .header-right { display: none; }
  /* Hide desktop mode switcher */
  .header-row1 .header-center { display: none; }

  /* Row 2: Edit / View mode switcher — full width, generous */
  .header-row2 {
    display: flex;
    padding: 0 14px 10px;
  }
  .header-row2 .mode-switcher {
    flex: 1;
  }
  .header-row2 .btn-mode {
    flex: 1;

  }

  /* Row 3: deck name + action buttons, scrollable */
  .header-row3 {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px 10px;
    border-top: 1px solid var(--border);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .header-row3::-webkit-scrollbar { display: none; }
  .header-row3 #deckNameInputMobile {
    flex-shrink: 0;

  .header-row3 #deckNameInputMobile::placeholder { color: var(--muted); font-weight: 400; font-family: 'Lato', sans-serif; }
  .header-row3 .btn { flex-shrink: 0; padding: 6px 12px; font-size: 0.75rem; }

  /* Nav links — keep them, they fit in row 1 */

  #pageEdit .deck-panel { display: none; }

  .browser-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }

}

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let CARDS = [];
let deck  = { oshi:{}, main:{}, cheer:{} };
let previewCard = null;
let currentMode = 'edit';
let activeType  = null;
let activeColor = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
async function loadCards() {
  try {
    const res = await fetch('cards.json');
    CARDS = await res.json();
    buildFilters();
    restoreSession();
    renderBrowser();
    renderDeck();
  } catch(e) {
    document.getElementById('browserGrid').innerHTML =
      '<div style="grid-column:1/-1;color:var(--muted);font-size:0.8rem;padding:24px;text-align:center">Could not load cards.json</div>';
  }
}

// ── Session auto-save (persists current deck across refreshes) ────────────────
const SESSION_KEY = 'hocg_session';

function saveSession() {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ name: getDeckName(), deck }));
  } catch(e) {}
}

function restoreSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return;
    const { name, deck: saved } = JSON.parse(raw);
    // Validate setcodes against loaded CARDS before restoring
    const valid = sec => Object.fromEntries(
      Object.entries(saved[sec] || {}).filter(([sc]) => CARDS.some(c => c.setcode === sc))
    );
    deck = { oshi: valid('oshi'), main: valid('main'), cheer: valid('cheer') };
    setDeckName(name || 'Untitled Deck');
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseName(raw) {
  if (!raw) return { jp:'', en:'' };
  const parts = raw.split('\n');
  const jp = parts[0].trim();
  const en = (parts[1]||'').replace(/[()]/g,'').trim();
  return { jp, en: en||jp };
}

function getSection(card) {
  const t = (card.type||'').toLowerCase();
  if (t.includes('oshi'))  return 'oshi';
  if (t.includes('debut')) return 'debut';
  if (t.includes('1st'))   return 'first';
  if (t.includes('2nd'))   return 'second';
  if (t.includes('spot'))  return 'spot';
  if (t.includes('cheer')) return 'cheer';
  return 'support';
}

function isUnlimited(card) {
  return (card.text||'').toLowerCase().includes('you may include any number');
}

function maxCopies(card) {
  const s = getSection(card);
  if (s==='cheer') return Infinity;
  if (s==='debut' && isUnlimited(card)) return Infinity;
  if (s==='oshi')  return 1;
  return 4;
}

function countInDeck(card) {
  const s = getSection(card);
  if (s==='oshi')  return deck.oshi[card.setcode]  || 0;
  if (s==='cheer') return deck.cheer[card.setcode] || 0;
  return deck.main[card.setcode] || 0;
}

const mainTotal   = () => Object.values(deck.main).reduce((a,b)=>a+b, 0);
const cheerTotal  = () => Object.values(deck.cheer).reduce((a,b)=>a+b, 0);
const hasOshi     = () => Object.keys(deck.oshi).length > 0;
const deckIsEmpty = () => !hasOshi() && mainTotal()===0 && cheerTotal()===0;

function toast(msg, ms=1800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Mode switching ────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('pageEdit').classList.toggle('active', mode==='edit');
  document.getElementById('pageView').classList.toggle('active', mode==='view');
  // Keep all four mode buttons in sync (desktop + mobile)
  ['modeEditBtn','modeEditBtnMobile'].forEach(id =>
    document.getElementById(id).classList.toggle('active', mode==='edit'));
  ['modeViewBtn','modeViewBtnMobile'].forEach(id =>
    document.getElementById(id).classList.toggle('active', mode==='view'));
  if (mode==='view') renderViewer();
}
document.getElementById('modeEditBtn').addEventListener('click',       () => setMode('edit'));
document.getElementById('modeViewBtn').addEventListener('click',       () => setMode('view'));
document.getElementById('modeEditBtnMobile').addEventListener('click', () => setMode('edit'));
document.getElementById('modeViewBtnMobile').addEventListener('click', () => setMode('view'));

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
  const types  = [...new Set(CARDS.map(c=>c.type).filter(Boolean))].sort();
  const colors = [...new Set(CARDS.map(c=>c.color).filter(Boolean).filter(c=>c!=='None'))].sort();
  const tEl = document.getElementById('typeFilters');
  const cEl = document.getElementById('colorFilters');
  tEl.innerHTML = '<span class="filter-label">Type</span>';
  cEl.innerHTML = '<span class="filter-label">Color</span>';
  types.forEach(t => {
    const c = document.createElement('button');
    c.className='filter-chip'; c.textContent=t; c.dataset.val=t;
    c.addEventListener('click', () => {
      activeType = activeType===t ? null : t;
      tEl.querySelectorAll('.filter-chip').forEach(x => x.classList.toggle('active', x.dataset.val===activeType));
      renderBrowser();
    });
    tEl.appendChild(c);
  });
  colors.forEach(cl => {
    const c = document.createElement('button');
    c.className='filter-chip'; c.textContent=cl; c.dataset.val=cl;
    c.addEventListener('click', () => {
      activeColor = activeColor===cl ? null : cl;
      cEl.querySelectorAll('.filter-chip').forEach(x => x.classList.toggle('active', x.dataset.val===activeColor));
      renderBrowser();
    });
    cEl.appendChild(c);
  });
}

// ── Browser ───────────────────────────────────────────────────────────────────
function renderBrowser() {
  const term = (document.getElementById('browserSearch').value||'').toLowerCase();
  const grid = document.getElementById('browserGrid');
  const filtered = CARDS.filter(card => {
    if (activeType  && card.type  !== activeType)  return false;
    if (activeColor && card.color !== activeColor) return false;
    if (term) {
      const {jp,en} = parseName(card.name);
      return en.toLowerCase().includes(term) || jp.toLowerCase().includes(term) ||
        card.setcode.toLowerCase().includes(term) ||
        (card.tags||'').toLowerCase().includes(term) ||
        (card.text||'').toLowerCase().includes(term);
    }
    return true;
  });

  grid.innerHTML = '';
  filtered.forEach(card => {
    const {en} = parseName(card.name);
    const qty  = countInDeck(card), max = maxCopies(card), maxed = isFinite(max) && qty >= max;
    const colorCls = 'color-' + (card.color||'None').replace(/[\s\/]/g,'');
    const el = document.createElement('div');
    el.className = `browser-card${qty>0?' in-deck':''}${maxed?' maxed':''}`;
    el.title = `${en} (${card.setcode})`;
    el.innerHTML = `
      ${card.image
        ? `<div class="bc-img-wrap"><img src="${card.image}" alt="${en}" loading="lazy"></div>`
        : `<div class="bc-placeholder">${en}</div>`}
      <div class="bc-color-bar ${colorCls}"></div>
      <div class="bc-info">
        <div class="bc-name">${en}</div>
        <div class="bc-sub">${card.setcode}</div>
      </div>
      ${qty>0 ? `<div class="in-deck-badge">${qty}</div>` : ''}
      <div class="bc-quick">
        ${qty>0 ? `<button class="bc-qbtn bc-qbtn-rem" title="Remove one">−</button>` : ''}
        <button class="bc-qbtn bc-qbtn-add" title="Add to deck" ${maxed?'disabled':''}">＋</button>
      </div>`;

    // Quick-add — stop propagation so card modal doesn't open
    const addBtn = el.querySelector('.bc-qbtn-add');
    if (addBtn) {
      addBtn.addEventListener('click', e => {
        e.stopPropagation();
        addCard(card);
      });
    }
    // Quick-remove
    const remBtn = el.querySelector('.bc-qbtn-rem');
    if (remBtn) {
      remBtn.addEventListener('click', e => {
        e.stopPropagation();
        removeOne(card.setcode, getSection(card));
      });
    }

    // Tap card body → open detail modal (only if not tapping a quick button)
    el.addEventListener('click', () => {
      openPreview(card, 'edit');
    });
    grid.appendChild(el);
  });

  document.getElementById('browserCount').textContent = `${filtered.length} cards`;
}

// ── Preview modal ─────────────────────────────────────────────────────────────
function openPreview(card, context) {
  previewCard = card;
  const {en, jp} = parseName(card.name);
  const qty = countInDeck(card);
  const sec = getSection(card);

  document.getElementById('modalImg').src = card.image||'';
  document.getElementById('modalImg').style.display = card.image ? '' : 'none';
  document.getElementById('modalSetcode').textContent = card.setcode;
  document.getElementById('modalName').textContent = en;
  document.getElementById('modalNameJp').textContent = (jp && jp!==en) ? jp : '';
  document.getElementById('modalText').textContent = card.text||'';
  document.getElementById('modalText').style.display = card.text ? '' : 'none';

  const meta = document.getElementById('modalMeta');
  meta.innerHTML = [card.type, card.color, card.rarity, card.life_hp ? `${card.life_hp} HP` : null]
    .filter(Boolean).map(v=>`<span class="modal-tag">${v}</span>`).join('');

  const addBtn = document.getElementById('modalAdd');
  if (context === 'view') {
    addBtn.style.display = 'none';
  } else {
    addBtn.style.display = '';
    const canAdd = sec==='oshi' ? !hasOshi()
      : sec==='cheer' ? cheerTotal()<20
      : mainTotal()<50 && (!isFinite(maxCopies(card)) || qty<maxCopies(card));
    addBtn.disabled = !canAdd;
    addBtn.textContent = canAdd
      ? `Add to Deck${qty>0 ? ` (×${qty+1})` : ''}`
      : sec==='oshi' && hasOshi() ? 'Oshi already set'
      : sec==='cheer' ? 'Cheer deck full'
      : qty>=maxCopies(card) ? `Max ${maxCopies(card)} copies`
      : 'Main deck full';
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function closePreview() {
  document.getElementById('modalOverlay').classList.remove('open');
  previewCard = null;
}

// ── Add / Remove ──────────────────────────────────────────────────────────────
function addCard(card) {
  const sec = getSection(card), qty = countInDeck(card), max = maxCopies(card);
  if (sec==='oshi') {
    if (hasOshi()) { toast('Oshi already set'); return false; }
    deck.oshi[card.setcode] = 1;
  } else if (sec==='cheer') {
    if (cheerTotal()>=20) { toast('Cheer deck full (20/20)'); return false; }
    deck.cheer[card.setcode] = (deck.cheer[card.setcode]||0)+1;
  } else {
    if (mainTotal()>=50)           { toast('Main deck full (50/50)'); return false; }
    if (isFinite(max) && qty>=max) { toast(`Max ${max} copies`); return false; }
    deck.main[card.setcode] = qty+1;
  }
  renderDeck(); renderBrowser(); return true;
}

function removeOne(setcode, sec) {
  if (sec==='oshi')        { delete deck.oshi[setcode]; }
  else if (sec==='cheer')  { if ((deck.cheer[setcode]||0)<=1) delete deck.cheer[setcode]; else deck.cheer[setcode]--; }
  else                     { if ((deck.main[setcode]||0)<=1) delete deck.main[setcode]; else deck.main[setcode]--; }
  renderDeck(); renderBrowser();
}

// ── Render deck panel ─────────────────────────────────────────────────────────
const SECTIONS = [
  {key:'oshi',    label:'Oshi',    pool:'oshi',  cls:'sec-oshi'},
  {key:'debut',   label:'Debut',   pool:'main',  cls:'sec-debut'},
  {key:'first',   label:'1st',     pool:'main',  cls:'sec-first'},
  {key:'second',  label:'2nd',     pool:'main',  cls:'sec-second'},
  {key:'spot',    label:'Spot',    pool:'main',  cls:'sec-spot'},
  {key:'support', label:'Support', pool:'main',  cls:'sec-support'},
  {key:'cheer',   label:'Cheer',   pool:'cheer', cls:'sec-cheer'},
];

function renderDeck() {
  const isMobile = window.innerWidth <= 680;
  const secEl  = document.getElementById(isMobile ? 'deckSectionsDrawer'   : 'deckSections');
  const statEl = document.getElementById(isMobile ? 'deckStatsDrawer'      : 'deckStats');
  const valEl  = document.getElementById(isMobile ? 'deckValidationDrawer' : 'deckValidation');
  ['deckSections','deckSectionsDrawer'].forEach(id => {
    const el = document.getElementById(id); if (el) el.innerHTML = '';
  });

  const groups = Object.fromEntries(SECTIONS.map(s=>[s.key,[]]));
  [...Object.entries(deck.oshi).map(([sc,q])=>({sc,q})),
   ...Object.entries(deck.main).map(([sc,q])=>({sc,q})),
   ...Object.entries(deck.cheer).map(([sc,q])=>({sc,q}))]
    .forEach(({sc,q}) => {
      const card = CARDS.find(c=>c.setcode===sc); if (!card) return;
      const sec  = getSection(card); if (groups[sec]) groups[sec].push({card, qty:q});
    });

  SECTIONS.forEach(s => {
    const entries = groups[s.key];
    const total   = entries.reduce((a,e)=>a+e.qty, 0);
    const wrap    = document.createElement('div');
    wrap.className = `deck-section ${s.cls}`;
    wrap.innerHTML = `<div class="deck-section-header"><span class="deck-section-title">${s.label}</span><span class="deck-section-count">${total}</span></div><div class="deck-section-body"></div>`;
    const body = wrap.querySelector('.deck-section-body');
    if (!entries.length) {
      body.innerHTML = '<div class="deck-empty-msg">Empty</div>';
    } else {
      [...entries].sort((a,b)=>parseName(a.card.name).en.localeCompare(parseName(b.card.name).en))
        .forEach(({card, qty}) => {
          const {en} = parseName(card.name);
          const row  = document.createElement('div');
          row.className = 'deck-entry';
          row.innerHTML = `
            ${card.image ? `<img class="deck-entry-thumb" src="${card.image}" alt="${en}">` : `<div class="deck-entry-thumb"></div>`}
            <div class="deck-entry-info">
              <div class="deck-entry-name">${en}</div>
              <div class="deck-entry-sub">${card.setcode}${isUnlimited(card)?' · ∞':''}</div>
            </div>
            <div class="deck-entry-controls">
              <button class="qty-btn minus">−</button>
              <span class="qty-display">${qty}</span>
              <button class="qty-btn plus">＋</button>
            </div>`;
          row.querySelector('.minus').addEventListener('click', () => removeOne(card.setcode, s.key));
          row.querySelector('.plus').addEventListener('click',  () => addCard(card));
          body.appendChild(row);
        });
    }
    secEl.appendChild(wrap);
  });

  const main=mainTotal(), cheer=cheerTotal(), oshi=hasOshi()?1:0;
  statEl.innerHTML = `
    <div class="stat-item"><div class="stat-label">Oshi</div><div class="stat-value ${oshi===1?'ok':'warn'}">${oshi}/1</div></div>
    <div class="stat-item"><div class="stat-label">Main Deck</div><div class="stat-value ${main===50?'ok':main>50?'err':'warn'}">${main}/50</div></div>
    <div class="stat-item"><div class="stat-label">Cheer Deck</div><div class="stat-value ${cheer===20?'ok':cheer>20?'err':'warn'}">${cheer}/20</div></div>
    <div class="stat-item"><div class="stat-label">Total</div><div class="stat-value">${oshi+main+cheer}</div></div>`;

  const issues = [];
  if (oshi!==1)  issues.push({cls:'err',  msg:'Needs exactly 1 Oshi card'});
  if (main<50)   issues.push({cls:'warn', msg:`Main deck: ${50-main} more card${50-main===1?'':'s'} needed`});
  if (main>50)   issues.push({cls:'err',  msg:`Main deck: ${main-50} card${main-50===1?'':'s'} over limit`});
  if (cheer<20)  issues.push({cls:'warn', msg:`Cheer deck: ${20-cheer} more card${20-cheer===1?'':'s'} needed`});
  if (cheer>20)  issues.push({cls:'err',  msg:`Cheer deck: ${cheer-20} card${cheer-20===1?'':'s'} over limit`});
  if (!issues.length) issues.push({cls:'ok', msg:'✓ Deck is tournament legal'});
  valEl.innerHTML = issues.map(i=>`<div class="validation-line ${i.cls}">${i.msg}</div>`).join('');

  const fabBadge = document.getElementById('deckFabBadge');
  if (fabBadge) fabBadge.textContent = oshi+main+cheer;
  saveSession();
}

// ── Render viewer ─────────────────────────────────────────────────────────────
const VSECTIONS = [
  {key:'oshi',    label:'Oshi',         vcls:'vsec-oshi'},
  {key:'debut',   label:'Debut',        vcls:'vsec-debut'},
  {key:'first',   label:'1st Holomem',  vcls:'vsec-first'},
  {key:'second',  label:'2nd Holomem',  vcls:'vsec-second'},
  {key:'spot',    label:'Spot Holomem', vcls:'vsec-spot'},
  {key:'support', label:'Support',      vcls:'vsec-support'},
  {key:'cheer',   label:'Cheer Deck',   vcls:'vsec-cheer'},
];

function renderViewer() {
  const emptyEl   = document.getElementById('viewerEmpty');
  const contentEl = document.getElementById('viewerContent');
  const bodyEl    = document.getElementById('viewerBody');

  if (deckIsEmpty()) { emptyEl.style.display='flex'; contentEl.style.display='none'; return; }
  emptyEl.style.display = 'none'; contentEl.style.display = 'flex';

  document.getElementById('viewerDeckName').textContent = getDeckName();
  const main=mainTotal(), cheer=cheerTotal(), oshi=hasOshi()?1:0;
  document.getElementById('viewerStats').innerHTML = `
    <div class="viewer-stat">Oshi <span>${oshi}/1</span></div>
    <div class="viewer-stat">Main <span>${main}/50</span></div>
    <div class="viewer-stat">Cheer <span>${cheer}/20</span></div>`;

  const groups = Object.fromEntries(VSECTIONS.map(s=>[s.key,[]]));
  [...Object.entries(deck.oshi).map(([sc,q])=>({sc,q})),
   ...Object.entries(deck.main).map(([sc,q])=>({sc,q})),
   ...Object.entries(deck.cheer).map(([sc,q])=>({sc,q}))]
    .forEach(({sc,q}) => {
      const card = CARDS.find(c=>c.setcode===sc); if (!card) return;
      const sec  = getSection(card); if (groups[sec]) groups[sec].push({card, qty:q});
    });

  bodyEl.innerHTML = '';
  VSECTIONS.forEach(s => {
    const entries = groups[s.key]; if (!entries.length) return;
    const total   = entries.reduce((a,e)=>a+e.qty, 0);
    const wrap    = document.createElement('div');
    wrap.className = `viewer-section ${s.vcls}`;
    wrap.innerHTML = `<div class="viewer-section-label">${s.label}<span class="viewer-section-count">${total} cards</span></div><div class="viewer-grid"></div>`;
    const grid = wrap.querySelector('.viewer-grid');
    [...entries].sort((a,b)=>parseName(a.card.name).en.localeCompare(parseName(b.card.name).en))
      .forEach(({card, qty}) => {
        const {en} = parseName(card.name);
        const el   = document.createElement('div');
        el.className = 'viewer-card';
        el.title     = `${en} — ${card.setcode}`;
        el.innerHTML = (card.image ? `<img src="${card.image}" alt="${en}" loading="lazy">` : `<div class="viewer-card-placeholder">${en}</div>`)
          + `<div class="viewer-qty-badge">×${qty}</div>`;
        el.addEventListener('click', () => openPreview(card, 'view'));
        grid.appendChild(el);
      });
    bodyEl.appendChild(wrap);
  });
}

// ── Save / Load ───────────────────────────────────────────────────────────────
function saveDeck(ext='hocg') {
  const name  = getDeckName();
  const lines = [`#name:${name}`, '#format:hOCG-1.0', '#'];
  [...Object.entries(deck.oshi), ...Object.entries(deck.main), ...Object.entries(deck.cheer)]
    .forEach(([sc,q]) => lines.push(`${sc}:${q}`));
  const text = lines.join('\n');
  const blob = new Blob([text], {type:'text/plain'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = `${name.replace(/[^\w\- ]/g,'_')}.${ext}`;
  a.click(); URL.revokeObjectURL(a.href);
  saveRecent(name, text);
  toast(`Deck saved as .${ext} ✓`);
}

// ── Recent Decks (localStorage, 4 slots) ──────────────────────────────────────
const RECENT_KEY = 'hocg_recent';
const RECENT_MAX = 4;

function saveRecent(name, text) {
  let slots = getRecentSlots();
  // Remove existing entry with same name
  slots = slots.filter(s => s.name !== name);
  // Prepend new entry
  slots.unshift({ name, text, date: Date.now() });
  // Trim to max
  slots = slots.slice(0, RECENT_MAX);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(slots)); } catch(e) {}
}

function getRecentSlots() {
  try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch(e) { return []; }
}

function deleteRecentSlot(name) {
  const slots = getRecentSlots().filter(s => s.name !== name);
  try { localStorage.setItem(RECENT_KEY, JSON.stringify(slots)); } catch(e) {}
}

function renderRecentSlots() {
  const slots = getRecentSlots();
  const section = document.getElementById('recentSection');
  const list    = document.getElementById('recentList');
  if (!slots.length) { section.style.display = 'none'; return; }
  section.style.display = '';
  list.innerHTML = slots.map(s => {
    const d = new Date(s.date);
    const label = d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
    const safeName = s.name.replace(/"/g, '&quot;').replace(/</g, '&lt;');
    return `<div class="recent-slot" data-name="${safeName}">
      <span class="recent-slot-name">${safeName}</span>
      <span class="recent-slot-date">${label}</span>
      <span class="recent-slot-del" data-del="${safeName}" title="Remove">✕</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.recent-slot').forEach(el => {
    el.addEventListener('click', e => {
      if (e.target.dataset.del) {
        e.stopPropagation();
        deleteRecentSlot(e.target.dataset.del);
        renderRecentSlots();
        return;
      }
      const name = el.dataset.name;
      const slot = getRecentSlots().find(s => s.name === name);
      if (slot) { closeLoadModal(); loadDeckText(slot.text); }
    });
  });
}

function loadDeckText(text) {
  const nd   = {oshi:{}, main:{}, cheer:{}};
  let name   = 'Untitled Deck';
  text.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line => {
    if (line.startsWith('#name:')) { name=line.slice(6); return; }
    if (line.startsWith('#')) return;
    const m = line.match(/^([A-Za-z0-9\-]+):(\d+)$/); if (!m) return;
    const card = CARDS.find(c=>c.setcode===m[1]);
    if (!card) { console.warn('Unknown setcode:', m[1]); return; }
    const qty=parseInt(m[2],10), sec=getSection(card);
    if (sec==='oshi')  nd.oshi[m[1]] = qty;
    else if (sec==='cheer') nd.cheer[m[1]] = qty;
    else nd.main[m[1]] = qty;
  });
  deck = nd;
  setDeckName(name);
  renderDeck(); renderBrowser();
  if (currentMode==='view') renderViewer();
  saveRecent(name, text);
  toast(`Loaded: ${name}`);
}

// ── Deck name helpers (keeps both inputs in sync) ─────────────────────────────
function getDeckName() {
  return document.getElementById('deckNameInput').value || 'Untitled Deck';
}
function setDeckName(name) {
  document.getElementById('deckNameInput').value = name;
  document.getElementById('deckNameInputMobile').value = name;
}

// ── Events ────────────────────────────────────────────────────────────────────
document.getElementById('browserSearch').addEventListener('input', renderBrowser);

// Deck name — sync both inputs
['deckNameInput','deckNameInputMobile'].forEach(id => {
  document.getElementById(id).addEventListener('input', e => {
    const other = id === 'deckNameInput' ? 'deckNameInputMobile' : 'deckNameInput';

  });
});

// Save modal — wire both save buttons
function openSaveOverlay() { document.getElementById('saveOverlay').classList.add('open'); }
document.getElementById('saveBtn').addEventListener('click',       openSaveOverlay);
document.getElementById('saveBtnMobile').addEventListener('click', openSaveOverlay);
document.getElementById('saveHocgBtn').addEventListener('click',  () => { document.getElementById('saveOverlay').classList.remove('open'); saveDeck('hocg'); });
document.getElementById('saveTxtBtn').addEventListener('click',   () => { document.getElementById('saveOverlay').classList.remove('open'); saveDeck('txt');  });
document.getElementById('saveCancelBtn').addEventListener('click',() => document.getElementById('saveOverlay').classList.remove('open'));
document.getElementById('saveOverlay').addEventListener('click',  e  => { if(e.target===e.currentTarget) document.getElementById('saveOverlay').classList.remove('open'); });

// Load modal — wire both load buttons
function openLoadOverlay() { renderRecentSlots(); document.getElementById('loadOverlay').classList.add('open'); }
function closeLoadModal() {
  document.getElementById('loadOverlay').classList.remove('open');
  document.getElementById('pasteSection').style.display = 'none';
  document.getElementById('pasteTextarea').value = '';
}
document.getElementById('loadBtn').addEventListener('click',        openLoadOverlay);
document.getElementById('loadBtnMobile').addEventListener('click',  openLoadOverlay);
document.getElementById('loadCancelBtn').addEventListener('click',  closeLoadModal);
document.getElementById('loadOverlay').addEventListener('click',    e  => { if(e.target===e.currentTarget) closeLoadModal(); });
document.getElementById('loadModalHandle').addEventListener('click', closeLoadModal);

// Swipe-down to dismiss load modal on mobile
(function(){
  const overlay = document.getElementById('loadOverlay');
  const modal   = overlay.querySelector('.modal');
  let startY = 0, dragging = false;
  modal.addEventListener('touchstart', e => { startY = e.touches[0].clientY; dragging = true; }, {passive:true});
  modal.addEventListener('touchmove',  e => {
    if (!dragging) return;
    const dy = e.touches[0].clientY - startY;
    if (dy > 0) modal.style.transform = `translateY(${dy}px)`;
  }, {passive:true});
  modal.addEventListener('touchend', e => {
    dragging = false;
    const dy = e.changedTouches[0].clientY - startY;
    modal.style.transform = '';
    if (dy > 80) closeLoadModal();
  });
})();
document.getElementById('showPasteBtn').addEventListener('click',   () => { document.getElementById('pasteSection').style.display='block'; setTimeout(()=>document.getElementById('pasteTextarea').focus(),80); });
document.getElementById('pasteBackBtn').addEventListener('click',   () => { document.getElementById('pasteSection').style.display='none'; document.getElementById('pasteTextarea').value=''; });
document.getElementById('pasteConfirmBtn').addEventListener('click',() => {
  const text = document.getElementById('pasteTextarea').value.trim();
  if (!text) { toast('Nothing to load'); return; }
  closeLoadModal(); loadDeckText(text);
});
document.getElementById('loadFile').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => { closeLoadModal(); loadDeckText(ev.target.result); };
  r.readAsText(f); e.target.value = '';
});

// Clear — wire both
function doClear() {
  if (!confirm('Clear current deck?')) return;
  deck={oshi:{},main:{},cheer:{}}; renderDeck(); renderBrowser(); if(currentMode==='view') renderViewer();
}
document.getElementById('clearBtn').addEventListener('click',       doClear);
document.getElementById('clearBtnMobile').addEventListener('click', doClear);

// New — wire both
function doNew() {
  if (!confirm('Start a new deck? Unsaved changes will be lost.')) return;
  deck={oshi:{},main:{},cheer:{}}; setDeckName('');
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
  renderDeck(); renderBrowser(); if(currentMode==='view') renderViewer();
}
document.getElementById('newDeckBtn').addEventListener('click',       doNew);
document.getElementById('newDeckBtnMobile').addEventListener('click', doNew);

// Modal
document.getElementById('modalAdd').addEventListener('click',     () => { if(!previewCard) return; if(addCard(previewCard)) openPreview(previewCard,'edit'); });

document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closePreview(); });

// Mobile deck drawer
function openDeckDrawer()  { document.getElementById('deckDrawer').classList.add('open'); document.getElementById('deckDrawerBackdrop').classList.add('open'); document.body.style.overflow='hidden'; renderDeck(); }
function closeDeckDrawer() { document.getElementById('deckDrawer').classList.remove('open'); document.getElementById('deckDrawerBackdrop').classList.remove('open'); document.body.style.overflow=''; }
document.getElementById('deckFab').addEventListener('click',           openDeckDrawer);
document.getElementById('deckDrawerClose').addEventListener('click',   closeDeckDrawer);
document.getElementById('deckDrawerHandle').addEventListener('click',  closeDeckDrawer);
document.getElementById('deckDrawerBackdrop').addEventListener('click',closeDeckDrawer);
window.addEventListener('resize', () => renderDeck());

loadCards();
</script>
